# yamllint disable rule:line-length
name: xcop
'on':
  push:
  pull_request:
permissions:
  contents: read
jobs:
  xcop:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: g4s8/xcop-action@4e93f123cab886ca8e481a737ee586bc9f02d228
