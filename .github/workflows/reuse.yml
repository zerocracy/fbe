---
# yamllint disable rule:line-length
name: reuse
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: read
jobs:
  reuse:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: fsfe/reuse-action@772649cfa03a64a08c458c7cca9a6a473d74e7f9
